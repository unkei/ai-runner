<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crowd Clash Runner</title>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hud" aria-label="Run status">
        <div>
          <span class="label">Score</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span class="label">Squad</span>
          <strong id="squad">12</strong>
        </div>
        <button id="restart" type="button">Restart</button>
      </section>

      <canvas id="game" width="420" height="720" aria-label="Crowd clash runner game"></canvas>

      <section class="controls" aria-label="Move controls">
        <button id="left" type="button" aria-label="Move left">Left</button>
        <button id="right" type="button" aria-label="Move right">Right</button>
      </section>
    </main>

    <script type="module" src="./src/game.js"></script>
  </body>
</html>
